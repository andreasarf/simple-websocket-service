server:
  port: 8881

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level){highlight} - %clr([%thread] [%X{traceId}] [%X{spanId}] [%X{sourceId}]){magenta} %clr(%logger{0}){cyan} : %msg %exception %nopex %n"
  level:
    dev.andreasarf: DEBUG

app:
  notification:
    queue: app.notification
    user:
      queue: app.user.notification
  websocket:
    broker:
      localtest:
        useSimple: true
    cors:
      allowedOrigins: '*'
    auth:
      enabled: false
  rbac:
    url: http://localhost:8882
    clientSecret: secret